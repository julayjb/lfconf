<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferidor Lotofácil</title>
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: #333333;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --info-color: #3b82f6;
            --accent-color: #8b5cf6;
        }

        html.light-theme {
            --bg-primary: #ffffff;
            --bg-secondary: #f3f4f6;
            --bg-tertiary: #e5e7eb;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #d1d5db;
            --success-color: #059669;
            --warning-color: #d97706;
            --danger-color: #dc2626;
            --info-color: #1d4ed8;
            --accent-color: #7c3aed;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent-color), var(--info-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background: var(--bg-tertiary);
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            font-weight: 600;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        button.danger {
            background: var(--danger-color);
        }

        button.success {
            background: var(--success-color);
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.1);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        /* Forms */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        /* Numbers input */
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .number-btn {
            aspect-ratio: 1;
            padding: 0;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            cursor: pointer;
        }

        .number-btn:hover {
            border-color: var(--accent-color);
        }

        .number-btn.selected {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        /* Games List */
        .games-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
        }

        .game-item {
            background: var(--bg-tertiary);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }

        .game-item:hover {
            border-color: var(--accent-color);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .game-title {
            font-weight: 600;
            color: var(--accent-color);
        }

        .game-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 10px 0;
        }

        .number-tag {
            background: var(--accent-color);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .game-notes {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-style: italic;
            margin: 10px 0;
        }

        .game-actions {
            display: flex;
            gap: 8px;
        }

        .game-actions button {
            padding: 6px 12px;
            font-size: 0.85rem;
            flex: 1;
        }

        /* Results Section */
        .results-container {
            margin-top: 40px;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .results-header h2 {
            color: var(--accent-color);
        }

        .result-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .result-card:hover {
            border-color: var(--accent-color);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .contest-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .contest-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .contest-date {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .result-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
        }

        .result-number {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .result-number.hit {
            background: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        /* Prize Info */
        .prizes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .prize-item {
            background: var(--bg-tertiary);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }

        .prize-title {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .prize-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--success-color);
        }

        .prize-winners {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        /* Status Messages */
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid var(--success-color);
            color: var(--success-color);
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .info {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid var(--info-color);
            color: var(--info-color);
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--info-color);
        }

        /* Match Stats */
        .match-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin: 15px 0;
        }

        .stat-box {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border-left: 3px solid var(--accent-color);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎰 Conferidor Lotofácil</h1>
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle">🌙 Escuro</button>
            </div>
        </header>

        <div class="main-grid">
            <!-- Left: Game Registration -->
            <div class="card">
                <h2>📝 Meus Jogos</h2>
                
                <div class="form-group">
                    <label for="gameName">Nome do Jogo (opcional)</label>
                    <input type="text" id="gameName" placeholder="Ex: Jogo 1, Meu palpite, etc">
                </div>

                <div class="form-group">
                    <label for="importNumbers">📋 Importar Dezenas (opcional)</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="importNumbers" placeholder="Cole as dezenas: 01,02,03... ou 01 02 03..." style="flex: 1;">
                        <button type="button" class="secondary" onclick="importNumbers()" style="padding: 10px 15px; white-space: nowrap;">Importar</button>
                    </div>
                    <small style="color: var(--text-secondary); display: block; margin-top: 8px;">
                        Aceita formato: 01,02,03,04... ou 01 02 03 04...
                    </small>
                </div>

                <div class="form-group">
                    <label>Dezenas (15-20) - Clique para selecionar:</label>
                    <div class="numbers-grid" id="numbersGrid"></div>
                    <small style="color: var(--text-secondary); display: block; margin-top: 8px;">
                        Selecionadas: <span id="selectedCount">0</span>/25
                    </small>
                </div>

                <div class="form-group">
                    <label for="gameNotes">Anotações (opcional)</label>
                    <textarea id="gameNotes" placeholder="Ex: Aposta em aniversários, datas..."></textarea>
                </div>

                <button class="success" onclick="addGame()" style="width: 100%; margin-bottom: 10px;">
                    ➕ Adicionar Jogo
                </button>

                <div id="gamesList" class="games-list"></div>

                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color);">
                    <small style="color: var(--text-secondary);">
                        Total de jogos: <strong id="gameCount">0</strong>/100
                    </small>
                </div>
            </div>

            <!-- Right: Results -->
            <div class="card">
                <h2>🎯 Últimos Resultados</h2>
                
                <button class="success" onclick="loadResults()" style="width: 100%; margin-bottom: 15px;">
                    🔄 Carregar Últimos 3 Resultados
                </button>

                <div id="resultsContainer" style="min-height: 300px;">
                    <p style="color: var(--text-secondary); text-align: center; padding: 40px 20px;">
                        Clique no botão acima para carregar os resultados
                    </p>
                </div>
            </div>
        </div>

        <!-- Full Width: Summary and Comparison -->
        <div class="results-container">
            <div id="comparisonContainer"></div>
        </div>
    </div>

    <script>
        // Constants
        const MAX_GAMES = 100;
        const MIN_NUMBERS = 15;
        const MAX_NUMBERS = 20;
        const TOTAL_NUMBERS = 25;
        const STORAGE_KEYS = {
            games: 'lotofacil_games',
            results: 'lotofacil_results',
            theme: 'lotofacil_theme'
        };

        // State
        let games = [];
        let results = [];
        let selectedNumbers = new Set();

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            createNumbersGrid();
            loadGames();
            initEventListeners();
        });

        // Theme Management
        function initTheme() {
            const saved = localStorage.getItem(STORAGE_KEYS.theme) || 'dark';
            applyTheme(saved);
        }

        function applyTheme(theme) {
            const html = document.documentElement;
            if (theme === 'light') {
                html.classList.add('light-theme');
                document.getElementById('themeToggle').textContent = '☀️ Claro';
            } else {
                html.classList.remove('light-theme');
                document.getElementById('themeToggle').textContent = '🌙 Escuro';
            }
            localStorage.setItem(STORAGE_KEYS.theme, theme);
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            const current = document.documentElement.classList.contains('light-theme') ? 'light' : 'dark';
            applyTheme(current === 'light' ? 'dark' : 'light');
        });

        // Numbers Grid
        function createNumbersGrid() {
            const grid = document.getElementById('numbersGrid');
            for (let i = 1; i <= TOTAL_NUMBERS; i++) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'number-btn';
                btn.textContent = String(i).padStart(2, '0');
                btn.onclick = () => toggleNumber(i, btn);
                grid.appendChild(btn);
            }
        }

        function importNumbers() {
            const importField = document.getElementById('importNumbers');
            const text = importField.value.trim();

            if (!text) {
                showError('Cole as dezenas antes de importar');
                return;
            }

            try {
                // Split by comma or space and clean
                const numbers = text
                    .split(/[,\s]+/)
                    .filter(n => n.length > 0)
                    .map(n => {
                        const num = parseInt(n.trim());
                        if (isNaN(num) || num < 1 || num > TOTAL_NUMBERS) {
                            throw new Error(`Número inválido: ${n}`);
                        }
                        return num;
                    });

                // Remove duplicates
                const uniqueNumbers = [...new Set(numbers)];

                if (uniqueNumbers.length < MIN_NUMBERS || uniqueNumbers.length > MAX_NUMBERS) {
                    showError(`Importe entre ${MIN_NUMBERS} e ${MAX_NUMBERS} dezenas. Encontradas: ${uniqueNumbers.length}`);
                    return;
                }

                // Clear current selection
                clearSelection();

                // Select imported numbers
                uniqueNumbers.sort((a, b) => a - b).forEach(num => {
                    selectedNumbers.add(num);
                    const btn = document.querySelector(`button.number-btn:nth-child(${num})`);
                    if (btn) btn.classList.add('selected');
                });

                updateSelectedCount();
                importField.value = '';
                showSuccess(`✅ ${uniqueNumbers.length} dezenas importadas!`);

            } catch (error) {
                showError(`❌ Erro ao importar: ${error.message}`);
            }
        }

        function toggleNumber(num, btn) {
            if (selectedNumbers.has(num)) {
                selectedNumbers.delete(num);
                btn.classList.remove('selected');
            } else {
                if (selectedNumbers.size < MAX_NUMBERS) {
                    selectedNumbers.add(num);
                    btn.classList.add('selected');
                }
            }
            updateSelectedCount();
        }

        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = selectedNumbers.size;
        }

        function clearSelection() {
            selectedNumbers.clear();
            document.querySelectorAll('.number-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            updateSelectedCount();
        }

        // Game Management
        function addGame() {
            if (games.length >= MAX_GAMES) {
                showError(`Máximo de ${MAX_GAMES} jogos atingido`);
                return;
            }

            if (selectedNumbers.size < MIN_NUMBERS || selectedNumbers.size > MAX_NUMBERS) {
                showError(`Selecione entre ${MIN_NUMBERS} e ${MAX_NUMBERS} dezenas`);
                return;
            }

            const gameName = document.getElementById('gameName').value || 
                           `Jogo ${games.length + 1}`;
            const gameNotes = document.getElementById('gameNotes').value;

            const game = {
                id: Date.now(),
                name: gameName,
                numbers: Array.from(selectedNumbers).sort((a, b) => a - b),
                notes: gameNotes,
                createdAt: new Date().toLocaleDateString('pt-BR')
            };

            games.push(game);
            saveGames();
            clearSelection();
            document.getElementById('gameName').value = '';
            document.getElementById('gameNotes').value = '';
            renderGames();
            showSuccess('Jogo adicionado com sucesso!');
        }

        function deleteGame(id) {
            if (confirm('Tem certeza que deseja deletar este jogo?')) {
                games = games.filter(g => g.id !== id);
                saveGames();
                renderGames();
                showSuccess('Jogo removido');
            }
        }

        function renderGames() {
            const container = document.getElementById('gamesList');
            document.getElementById('gameCount').textContent = games.length;

            if (games.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Nenhum jogo cadastrado</p>';
                return;
            }

            container.innerHTML = games.map((game, idx) => `
                <div class="game-item">
                    <div class="game-header">
                        <div>
                            <div class="game-title">${game.name}</div>
                            <div style="font-size: 0.85rem; color: var(--text-secondary);">${game.createdAt}</div>
                        </div>
                    </div>
                    <div class="game-numbers">
                        ${game.numbers.map(n => `<span class="number-tag">${String(n).padStart(2, '0')}</span>`).join('')}
                    </div>
                    ${game.notes ? `<div class="game-notes">📌 ${game.notes}</div>` : ''}
                    <div class="game-actions">
                        <button class="danger" onclick="deleteGame(${game.id})">🗑️ Deletar</button>
                    </div>
                </div>
            `).join('');
        }

        function saveGames() {
            localStorage.setItem(STORAGE_KEYS.games, JSON.stringify(games));
        }

        function loadGames() {
            const saved = localStorage.getItem(STORAGE_KEYS.games);
            games = saved ? JSON.parse(saved) : [];
            renderGames();
        }

        // Results API
        async function loadResults() {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '<div class="loading">⏳ Carregando resultados...</div>';

            try {
                // Fetch the latest result
                const latestResponse = await fetch('https://loteriascaixa-api.herokuapp.com/api/lotofacil/latest');
                
                if (!latestResponse.ok) throw new Error('Erro ao buscar API');
                
                const latestData = await latestResponse.json();
                const lastConcurso = latestData.concurso;

                // Get the last 3 results
                const lastResults = [];
                for (let i = 0; i < 3; i++) {
                    const concurso = lastConcurso - i;
                    const response = await fetch(`https://loteriascaixa-api.herokuapp.com/api/lotofacil/${concurso}`);
                    
                    if (!response.ok) throw new Error(`Erro ao buscar concurso ${concurso}`);
                    
                    const data = await response.json();
                    lastResults.push(data);
                }

                results = lastResults;
                saveResults();
                renderResults();
                compareWithGames();
                
            } catch (error) {
                console.error('Erro:', error);
                container.innerHTML = `<div class="error">❌ Erro ao carregar resultados: ${error.message}</div>`;
            }
        }

        function renderResults() {
            const container = document.getElementById('resultsContainer');
            
            if (results.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">Nenhum resultado carregado</p>';
                return;
            }

            container.innerHTML = results.map(result => {
                const numbers = result.dezenas.map(n => parseInt(n)).sort((a, b) => a - b);
                const date = result.data;

                return `
                    <div class="result-card">
                        <div class="result-header">
                            <div class="contest-info">
                                <div class="contest-number">Concurso ${result.concurso}</div>
                                <div class="contest-date">${date}</div>
                            </div>
                            ${result.acumulou ? '<span style="color: var(--warning-color); font-weight: bold;">📈 ACUMULOU</span>' : ''}
                        </div>
                        
                        <div class="result-numbers">
                            ${numbers.map(n => `
                                <div class="result-number">${String(n).padStart(2, '0')}</div>
                            `).join('')}
                        </div>

                        <div class="prizes-grid">
                            ${renderPrizes(result)}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPrizes(result) {
            return result.premiacoes.map(premio => {
                const acertos = parseInt(premio.descricao);
                
                return `
                    <div class="prize-item">
                        <div class="prize-title">${premio.descricao}</div>
                        <div class="prize-value">
                            ${premio.valorPremio > 0 ? `R$ ${formatCurrency(premio.valorPremio)}` : 'Sem ganhador'}
                        </div>
                        <div class="prize-winners">${premio.ganhadores} ganhador(es)</div>
                    </div>
                `;
            }).join('');
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
        }

        function saveResults() {
            localStorage.setItem(STORAGE_KEYS.results, JSON.stringify(results));
        }

        // Comparison
        function compareWithGames() {
            const container = document.getElementById('comparisonContainer');
            
            if (games.length === 0 || results.length === 0) {
                container.innerHTML = '';
                return;
            }

            let html = '<h2 style="color: var(--accent-color); margin-bottom: 20px;">📊 Comparação com Seus Jogos</h2>';
            
            const comparisons = [];

            games.forEach(game => {
                results.forEach(result => {
                    const resultNumbers = new Set(result.dezenas.map(n => parseInt(n)));
                    const hits = game.numbers.filter(n => resultNumbers.has(n));
                    
                    if (hits.length >= 11) {
                        comparisons.push({
                            game,
                            result,
                            hits,
                            hitsCount: hits.length
                        });
                    }
                });
            });

            if (comparisons.length === 0) {
                html += '<p style="color: var(--text-secondary); text-align: center; padding: 40px 20px;">Nenhum resultado com 11+ acertos</p>';
            } else {
                html += comparisons.map(comp => `
                    <div class="card" style="margin-bottom: 20px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div>
                                <h3 style="color: var(--accent-color); margin-bottom: 10px;">${comp.game.name}</h3>
                                <div class="game-numbers">
                                    ${comp.game.numbers.map(n => `
                                        <span class="number-tag" style="background: ${comp.hits.includes(n) ? 'var(--success-color)' : 'var(--accent-color)'};">
                                            ${String(n).padStart(2, '0')}
                                        </span>
                                    `).join('')}
                                </div>
                                ${comp.game.notes ? `<div class="game-notes">📌 ${comp.game.notes}</div>` : ''}
                            </div>
                            <div>
                                <h3 style="color: var(--info-color); margin-bottom: 10px;">Concurso ${comp.result.concurso}</h3>
                                <div class="match-stats">
                                    <div class="stat-box">
                                        <div class="stat-label">Acertos</div>
                                        <div class="stat-value" style="color: var(--success-color);">${comp.hitsCount}</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-label">Erros</div>
                                        <div class="stat-value">${comp.game.numbers.length - comp.hitsCount}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            container.innerHTML = html;
        }

        // Utilities
        function showSuccess(msg) {
            const div = document.createElement('div');
            div.className = 'success';
            div.textContent = msg;
            document.body.insertBefore(div, document.body.firstChild);
            setTimeout(() => div.remove(), 3000);
        }

        function showError(msg) {
            const div = document.createElement('div');
            div.className = 'error';
            div.textContent = msg;
            document.body.insertBefore(div, document.body.firstChild);
            setTimeout(() => div.remove(), 3000);
        }

        function initEventListeners() {
            document.getElementById('gameName').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addGame();
            });
        }
    </script>
</body>
</html>
